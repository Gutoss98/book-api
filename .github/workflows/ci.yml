name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build Docker image
        run: |
          docker build -t book-api:latest .

      - name: Tag image
        run: |
          docker tag book-api:latest \
            768309077042.dkr.ecr.eu-central-1.amazonaws.com/book-api:latest

          docker tag book-api:latest \
            768309077042.dkr.ecr.eu-central-1.amazonaws.com/book-api:${{ github.sha }}

      - name: Push image to Amazon ECR
        run: |
          docker push \
            768309077042.dkr.ecr.eu-central-1.amazonaws.com/book-api:latest

          docker push \
            768309077042.dkr.ecr.eu-central-1.amazonaws.com/book-api:${{ github.sha }}
   
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster book-api-cluster \
            --service book-api-service \
            --force-new-deployment \
            --region eu-central-1
